name: Codex Code Review

# pull_request_target runs in the base repo context (has secrets) and
# fires for fork PRs too, unlike pull_request which loses secrets for forks.
# The Codex step uses sandbox: read-only so no fork code is executed.

on:
  workflow_call:
    secrets:
      OPENAI_API_KEY:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      review: ${{ steps.codex.outputs.final-message }}
    steps:
      - name: Fetch PR diff and write review prompt
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
        run: |
          # Fetch diff via gh API — no git sandbox restrictions
          gh pr diff "$PR_NUMBER" --repo "$REPO" > /tmp/pr.diff 2>/dev/null || true

          cat > /tmp/review-prompt.md << 'EOF'
          You are a senior code reviewer. Review only the diff introduced in this PR.
          The full diff is included below — do NOT attempt to run git or shell commands.
          EOF

          printf "PR number: %s\nPR title: %s\nPR description:\n%s\n\n" \
            "$PR_NUMBER" "$PR_TITLE" "$PR_BODY" >> /tmp/review-prompt.md

          echo "## Diff" >> /tmp/review-prompt.md
          echo '```diff' >> /tmp/review-prompt.md
          cat /tmp/pr.diff >> /tmp/review-prompt.md
          echo '```' >> /tmp/review-prompt.md

          cat >> /tmp/review-prompt.md << 'EOF'

          Check for:
          - Bugs or logic errors
          - Security vulnerabilities (injection, XSS, insecure defaults)
          - Performance issues
          - Missing or inadequate error handling
          - Test coverage gaps

          Format your response as a concise Markdown review with clear sections.
          EOF

      - name: Run Codex Review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          safety-strategy: drop-sudo
          sandbox: read-only
          allow-bots: true
          prompt-file: /tmp/review-prompt.md

  post-review:
    runs-on: ubuntu-latest
    needs: review
    if: needs.review.outputs.review != ''
    permissions:
      pull-requests: write
      issues: write
    steps:
      - uses: actions/github-script@v7
        env:
          REVIEW: ${{ needs.review.outputs.review }}
        with:
          script: |
            // Unescape literal \n sequences that codex-action emits in step outputs
            let review = process.env.REVIEW || '';
            // Strip wrapping quotes if the output is JSON-stringified
            if (review.startsWith('"') && review.endsWith('"')) {
              try { review = JSON.parse(review); } catch(e) {}
            }
            review = review.replace(/\\n/g, '\n').replace(/\\t/g, '\t');
            const body = `<!-- codex-review -->\n## Codex Code Review\n\n${review}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(c => c.body.includes('<!-- codex-review -->'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
