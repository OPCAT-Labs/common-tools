name: Claude Interactive

on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      GH_PAT:
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    # Security gating (author_association check) is done by the caller workflow's
    # `if` condition. Do NOT duplicate it here — in a reusable workflow context,
    # github.event_name is 'workflow_call', so event-specific checks always fail.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: anthropics/claude-code-action@5f8e5bfe5b03891348854ae401476fc905a6ff6a # v1
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          claude_args: >
            --max-turns 30
            --allowedTools 'Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(git:*),Bash(npm:*),Bash(yarn:*),Bash(npx:*),Bash(gh pr create:*),Bash(gh pr view:*),Bash(gh issue comment:*)'
