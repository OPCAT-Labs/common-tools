name: Claude Issue Triage

on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      GH_PAT:
        required: true

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Ensure triage labels exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING_LABELS=$(gh label list \
            --repo "${{ github.repository }}" \
            --limit 1000 \
            --json name \
            --jq '.[].name')

          ensure_label() {
            local name="$1"
            local color="$2"
            local description="$3"

            if echo "$EXISTING_LABELS" | grep -Fxq "$name"; then
              echo "Label already exists: $name"
              return 0
            fi

            gh label create "$name" \
              --repo "${{ github.repository }}" \
              --color "$color" \
              --description "$description"
          }

          ensure_label "priority:critical" "B60205" "Critical priority"
          ensure_label "priority:high" "D93F0B" "High priority"
          ensure_label "priority:medium" "E4E669" "Medium priority"
          ensure_label "priority:low" "0E8A16" "Low priority"
          ensure_label "claude-fixable" "1D76DB" "Clear bug that Claude can auto-fix"

      - name: Determine assignee
        id: assignee
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSIGNEES=$(gh api repos/${{ github.repository }}/assignees --jq '.[].login')
          TOP_CONTRIBUTOR=$(gh api repos/${{ github.repository }}/contributors --jq '.[].login' | while read -r login; do
            echo "$ASSIGNEES" | grep -qx "$login" && echo "$login" && break
          done)
          ASSIGNEE="$TOP_CONTRIBUTOR"
          echo "login=$ASSIGNEE" >> $GITHUB_OUTPUT

      - uses: anthropics/claude-code-action@5f8e5bfe5b03891348854ae401476fc905a6ff6a # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Triage issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            Issue body:
            ${{ github.event.issue.body }}

            Instructions (base your triage solely on the issue title and body above — do NOT read source files or explore the codebase):
            1. Add appropriate labels (bug, enhancement, question, documentation) with:
               gh issue edit ${{ github.event.issue.number }} --add-label "LABEL"
            2. Assess severity and add a priority label (priority:critical, priority:high, priority:medium, priority:low) with:
               gh issue edit ${{ github.event.issue.number }} --add-label "priority:LEVEL"
            3. If it is a clear bug with enough context to fix automatically, also add the label "claude-fixable".
            4. If "${{ steps.assignee.outputs.login }}" is not empty, assign the issue with:
               gh issue edit ${{ github.event.issue.number }} --add-assignee "${{ steps.assignee.outputs.login }}"
            5. Post a brief comment summarizing your triage assessment with:
               gh issue comment ${{ github.event.issue.number }} --body "COMMENT"
          claude_args: >
            --max-turns 10
            --allowedTools 'Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label:*)'

      - name: Trigger auto-fix if fixable
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if gh issue view ${{ github.event.issue.number }} --json labels --jq '.labels[].name' | grep -q 'claude-fixable'; then
            gh api repos/${{ github.repository }}/dispatches \
              -f event_type=claude-fixable \
              -f 'client_payload[issue_number]=${{ github.event.issue.number }}' \
              -f 'client_payload[assignee]=${{ steps.assignee.outputs.login }}'
          fi
